site_name: Inteligencia Artificial — Tutoriales
site_description: Repositorio de tutoriales y recursos sobre Inteligencia Artificial, LLMs, APIs y Python
site_author: LegalIntermediaSL
site_url: https://legalintermediasl.github.io/InteligenciaArtificial/

repo_name: LegalIntermediaSL/InteligenciaArtificial
repo_url: https://github.com/LegalIntermediaSL/InteligenciaArtificial

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

